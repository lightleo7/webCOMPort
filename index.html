<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>webPlotter</title>
    <link rel="stylesheet" href="./output.css">
    <style>
        .plot-tooltip {
            position: fixed;
            background: rgba(20, 20, 30, 0.95);
            backdrop-filter: blur(8px);
            color: #f0f0f0;
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            pointer-events: none;
            z-index: 9999;
            border-left: 4px solid;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
            transition: opacity 0.1s ease;
            white-space: nowrap;
        }
        .plot-tooltip.hidden {
            opacity: 0;
            visibility: hidden;
        }
        canvas {
            cursor: crosshair;
            display: block;
            width: 100%;
        }
        .content-wrapper {
            padding-left: 1rem;
            padding-right: 1rem;
        }
        body.dark .plot-tooltip {
            background: rgba(0, 0, 0, 0.92);
        }
        body.light .plot-tooltip {
            background: rgba(40, 40, 55, 0.96);
            color: #f5f5f5;
        }
        .dark #port {
            color: #e5e7eb !important;
        }
        #port {
            color: #1f2937;
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (localStorage.getItem('theme') === 'dark' ||
                (!localStorage.getItem('theme') &&
                    window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                document.body.classList.add('dark');
            } else {
                document.documentElement.classList.add('light');
                document.body.classList.add('light');
            }
        });
    </script>
</head>

<body class="dark:bg-gray-800 bg-gray-100">
    <div class="p-5 pb-0 content-wrapper">
        <div class="shadow-md border-gray-300 p-4 inline-block rounded-xl bg-white dark:bg-gray-800 w-full">
            <div class="flex justify-between w-full text-base">
                <label for="baudRate" class="block mb-2 text-lg font-bold text-gray-900 dark:text-white">Управление</label>
                <p id="status" class="block mb-2 text-lg font-bold text-red-400 text-right">[Отключено]</p>
            </div>
            <select style="display: inline-block;" id="baudRate"
                class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white">
                <option>300</option><option>600</option><option>750</option><option>1200</option><option>2400</option>
                <option>4800</option><option selected>9600</option><option>19200</option><option>31250</option>
                <option>38400</option><option>57600</option><option>74880</option><option>115200</option>
                <option>230400</option><option>250000</option>
            </select>
            <button type="button" style="display: inline-block;" id="ctrlBtn"
                class="focus:outline-none text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-semibold rounded-lg text-sm px-5 py-2.5 me-2 ms-2 mb-2 dark:bg-blue-600">Подключиться</button>
            <button type="button" style="display: inline-block;"
                class="stopRead focus:outline-none text-white focus:ring-4 font-semibold rounded-lg text-sm px-5 py-2.5 me-2 mb-2 bg-blue-600 hover:bg-blue-700"
                onclick="if(window.toggleReading) window.toggleReading()">Остановить чтение</button>
        </div>
    </div>
    <div id="forCanvas" class="p-5 pt-3 content-wrapper">
        <div id="msg" class="mb-3">
            <div class="shadow-md border-gray-300 p-4 rounded-xl inline-block w-full bg-white dark:bg-gray-800">
                <label for="message" class="block mb-2 text-lg font-bold text-gray-900 dark:text-white">Сообщение</label>
                <input type="text" id="message" placeholder="Напишите что-то..." spellcheck="false"
                    class="mb-3 bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white" />
                <button type="button" id="sendMessage"
                    class="focus:outline-none text-white bg-blue-700 hover:bg-blue-800 font-semibold rounded-lg text-sm px-5 py-2.5 me-2 mb-2">Отправить</button>
                <button type="button" id="clsMessage"
                    class="focus:outline-none text-white focus:ring-4 font-semibold rounded-lg text-sm px-5 py-2.5 me-2 mb-2 bg-blue-600 hover:bg-blue-700">Очистить</button>
                <select id="addToMsg"
                    class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                    <option selected>Нет конца строки</option>
                    <option>Новая строка (\n)</option>
                    <option>Возврат каретки (\r)</option>
                    <option>Новая строка и возврат каретки (\r\n)</option>
                </select>
            </div>
        </div>
        <div id="plotter">
            <ul class="flex flex-wrap text-sm font-semibold text-center text-gray-400 mb-3">
                <li class="me-2"><a href="#canvas" class="inline-block px-4 py-3 text-white bg-blue-600 rounded-lg active">Плоттер</a></li>
                <li class="me-2"><a href="#" class="monPortActivate inline-block px-4 py-3 rounded-lg hover:text-gray-900 dark:hover:text-white">Монитор порта</a></li>
                <div class="absolute right-0 pe-3">
                    <button type="button" class="stopReadGlobal focus:outline-none text-white font-semibold rounded-lg text-sm px-5 py-2.5 me-2 mb-2 bg-blue-600 hover:bg-blue-700"
                        onclick="if(window.toggleReading) window.toggleReading()">Остановить чтение</button>
                </div>
            </ul>
            <p class="block mb-2 text-xl font-bold text-gray-900 dark:text-white">Плоттер</p>
            <canvas id="canvas" class="h-[70vh] w-full dark:bg-gray-700 bg-white rounded-lg mb-3 shadow-lg" style="min-height: 400px;"></canvas>
            <div class="shadow-md border-gray-300 p-3 rounded-xl bg-white dark:bg-gray-800">
                <p class="text-xl text-gray-900 dark:text-white mb-3 font-bold">Настройки</p>
                <div class="flex items-center mb-4">
                    <input id="autosize" type="checkbox" class="w-4 h-4 text-blue-600 rounded-sm focus:ring-blue-600 bg-gray-300 border-gray-600">
                    <label for="autosize" class="ms-2 text-sm font-semibold text-gray-900 dark:text-gray-300">Автомасштабирование</label>
                </div>
                <div class="flex items-center mb-4">
                    <input id="showdots" type="checkbox" class="w-4 h-4 text-blue-600 rounded-sm focus:ring-blue-600 bg-gray-300 border-gray-600">
                    <label for="showdots" class="ms-2 text-sm font-semibold text-gray-900 dark:text-gray-300">Показывать кружки на точках (может влиять на производительность)</label>
                </div>
                <div class="mb-1">
                    <label for="xmaxtext" class="block mb-2 text-sm font-semibold text-gray-900 dark:text-white">Количество точек (память)</label>
                    <input type="number" id="xmaxtext" class="mb-3 bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white" />
                    <label for="ymaxtext" class="block mb-2 text-sm font-semibold text-gray-900 dark:text-white">Диапазон Y (значение)</label>
                    <input type="number" id="ymaxtext" class="mb-3 bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white" />
                </div>
            </div>
        </div>
        <div id="monport" style="display: none;">
            <ul class="flex flex-wrap text-sm font-semibold text-center text-gray-400 mb-3">
                <li class="me-2"><a href="#" class="plotterActivate inline-block px-4 py-3 rounded-lg hover:text-gray-900 dark:hover:text-white">Плоттер</a></li>
                <li class="me-2"><a href="#port" class="inline-block px-4 py-3 rounded-lg text-white bg-blue-600 active">Монитор порта</a></li>
                <div class="absolute right-0 pe-3"><button class="stopReadMonitor bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg text-sm px-5 py-2.5" onclick="if(window.toggleReading) window.toggleReading()">Остановить чтение</button></div>
            </ul>
            <label class="block mb-2 font-bold text-xl text-gray-900 dark:text-white">Монитор порта</label>
            <textarea id="port" rows="20" class="block p-2.5 w-full text-sm bg-gray-50 rounded-lg border border-gray-300 dark:bg-gray-700 dark:border-gray-600 dark:text-white mb-3 font-mono" placeholder="Данные с порта..." spellcheck="false"></textarea>
            <div class="shadow-md border-gray-300 p-4 rounded-xl bg-white dark:bg-gray-800">
                <p class="text-xl text-gray-900 dark:text-white mb-3 font-bold">Настройки монитора</p>
                <div class="flex flex-wrap gap-4">
                    <div class="flex items-center"><input id="autoscroll" type="checkbox" checked class="w-4 h-4 text-blue-600 rounded"><label class="ms-2 text-sm font-semibold text-gray-900 dark:text-gray-300">Автопрокрутка</label></div>
                    <div class="flex items-center"><input id="showusermessages" type="checkbox" class="w-4 h-4 text-blue-600 rounded"><label class="ms-2 text-sm font-semibold text-gray-900 dark:text-gray-300">Показывать мои сообщения</label></div>
                    <div class="flex items-center"><input id="autoshowtime" type="checkbox" class="w-4 h-4 text-blue-600 rounded"><label class="ms-2 text-sm font-semibold text-gray-900 dark:text-gray-300">Показывать время</label></div>
                    <div class="flex items-center"><input id="autonewline" type="checkbox" checked class="w-4 h-4 text-blue-600 rounded"><label class="ms-2 text-sm font-semibold text-gray-900 dark:text-gray-300">Автоперенос строки</label></div>
                </div>
                <div class="mt-3"><label class="block mb-2 text-sm font-semibold text-gray-900 dark:text-gray-300">Максимум строк</label><input type="number" id="mxlines" class="bg-gray-50 dark:bg-gray-700 border rounded-lg w-full p-2.5 text-gray-900 dark:text-white" /></div>
            </div>
        </div>
        <div class="shadow-md border-gray-300 p-4 rounded-xl bg-white dark:bg-gray-800 mt-3">
            <p class="text-xl text-gray-900 dark:text-white mb-3 font-bold">Информация о подключении</p>
            <p id="connectInfo" class="text-sm font-semibold text-gray-900 dark:text-white">Подключитесь для получения информации</p>
        </div>
    </div>
    <div id="tooltip" class="plot-tooltip hidden"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        // ---------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ----------
        let connected = false;
        let isPlotter = true;
        let readingEnabled = true;
        let autoSize = false;
        let showDots = false;
        let xMax = 70;
        let yMax = 1024;
        let allData = [];
        let colors = ["#10b981", "#ef4444", "#3b82f6", "#f59e0b", "#8b5cf6", "#ec489a", "#06b6d4"];
        let autoScroll = true, autoShowTime = false, autoNewLine = true, showUserMessages = false;
        let mxLines = 100;
        let buffer = '';
        let currentReader = null;
        let readingLoopActive = false;
        let isClosing = false;

        function max(a, b) {
            return a > b ? a : b;
        }
        function abs(a) {
            return a < 0 ? -a : a;
        }

        function mx_inner(massiv) {
            let mx = massiv[0][0];
            massiv.forEach((out) => {
                out.forEach((inn) => {
                    if (inn > mx) mx = inn;
                });
            });
            return mx;
        }


        function mn_inner(massiv) {
            let mn = massiv[0][0];
            massiv.forEach((out) => {
                out.forEach((inn) => {
                    if (inn < mn) mn = inn;
                });
            });
            return mn;
        }
        
        const canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d');
        const tooltipDiv = document.getElementById('tooltip');
        
        // Переключение чтения
        window.toggleReading = function() {
            if (isClosing) return;
            readingEnabled = !readingEnabled;
            const btnText = readingEnabled ? "Остановить чтение" : "Продолжить чтение";
            $(".stopRead, .stopReadGlobal, .stopReadMonitor").html(btnText);
        };
        
        function resizeCanvas() {
            if (!canvas) return;
            const container = canvas.parentElement;
            canvas.width = container.clientWidth - 20;
            canvas.height = Math.min(window.innerHeight * 0.55, 480);
            canvas.style.width = '100%';
            drawPlotter();
        }
        window.addEventListener('resize', () => { resizeCanvas(); drawPlotter(); });
        
        function getX(idx, total) {
            if (total <= 1) return canvas.width / 2;
            return (idx / (total - 1)) * canvas.width;
        }
        function getY(val) {
            const centerY = canvas.height / 2;
            const scale = canvas.height / (yMax * 2);
            return centerY - (val * scale);
        }
        
        function drawPlotter() {
            if (!isPlotter || !canvas || !ctx) return;
            if (canvas.width === 0) resizeCanvas();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (canvas.width === 0) return;
            
            const centerY = canvas.height / 2;
            ctx.save();
            ctx.strokeStyle = "#9ca3af";
            ctx.lineWidth = 1;
            [-yMax, -yMax/2, 0, yMax/2, yMax].forEach(lev => {
                const y = getY(lev);
                if (y >= 0 && y <= canvas.height) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(canvas.width, y);
                    ctx.strokeStyle = "#cbd5e1";
                    ctx.stroke();
                }
            });
            ctx.font = "13px monospace";
            ctx.fillStyle = "#cbd5e1";
            ctx.fillText(`${yMax}`, 5, getY(yMax)+12);
            ctx.fillText(`${yMax/2}`, 5, getY(yMax/2)-4);
            ctx.fillText(`0`, 5, centerY-4);
            ctx.fillText(`${-yMax/2}`, 5, getY(-yMax/2)+12);
            ctx.fillText(`${-yMax}`, 5, getY(-yMax)-4);
            
            for (let lineIdx = 0; lineIdx < allData.length; lineIdx++) {
                const dataArr = allData[lineIdx];
                if (!dataArr || dataArr.length < 2) continue;
                const color = colors[lineIdx % colors.length];
                
                ctx.beginPath();
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                let first = true;
                for (let i = 0; i < dataArr.length; i++) {
                    const val = dataArr[i];
                    if (isNaN(val)) continue;
                    const x = getX(i, dataArr.length);
                    const y = getY(val);
                    if (first) { ctx.moveTo(x, y); first = false; }
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
                
                if (showDots) {
                    for (let i = 0; i < dataArr.length; i++) {
                        const val = dataArr[i];
                        if (isNaN(val)) continue;
                        const x = getX(i, dataArr.length);
                        const y = getY(val);
                        ctx.beginPath();
                        ctx.fillStyle = color;
                        ctx.arc(x, y, 3, 0, 2 * Math.PI);
                        ctx.fill();
                        ctx.fillStyle = "white";
                        ctx.beginPath();
                        ctx.arc(x, y, 2, 0, 2 * Math.PI);
                        ctx.fill();
                    }
                }
            }
            ctx.restore();
        }
        
        function addPoint(lineIdx, value) {
            if (!allData[lineIdx]) allData[lineIdx] = [];
            const arr = allData[lineIdx];
            arr.push(value);
            while (arr.length > xMax) arr.shift();
        }
        
        function processNumbers(ints) {
            if (!ints.length) return;
            if (ints.length < allData.length) allData.length = ints.length;
            let maxAbs = 0;
            for (let i = 0; i < ints.length; i++) {
                const v = ints[i];
                if (isNaN(v)) continue;
                addPoint(i, v);
                if (Math.abs(v) > maxAbs) maxAbs = Math.abs(v);
            }
            if (autoSize && maxAbs > 0) {
                let target_max = mx_inner(allData);
                let target_min = mn_inner(allData);
                let target = max(target_max, abs(target_min));
                if (target < 5) target = 20;
                yMax = target;
                $("#ymaxtext").val(yMax);
            }
            drawPlotter();
        }
        
        let monitorLines = [];
        
        function addMonitorText(data) {
            let prefix = autoShowTime ? `[${new Date().toLocaleTimeString("ru")}.${new Date().getMilliseconds()}] ` : "";
            let suffix = autoNewLine ? "\n" : "";
            const fullLine = prefix + data + suffix;
            
            monitorLines.push(fullLine);
            while (monitorLines.length > mxLines) {
                monitorLines.shift();
            }
            $("#port").val(monitorLines.join(''));
            if (autoScroll) {
                const textarea = document.getElementById("port");
                textarea.scrollTop = textarea.scrollHeight;
            }
        }
        
        // Проверка существующего порта при загрузке
        async function checkExistingPort() {
            try {
                if (!navigator.serial) return;
                const ports = await navigator.serial.getPorts();
                if (ports.length > 0) {
                    console.log("Найден существующий порт, закрываем...");
                    for (const port of ports) {
                        try {
                            if (port.readable || port.writable) {
                                if (port.readable) {
                                    const reader = port.readable.getReader();
                                    await reader.cancel();
                                    reader.releaseLock();
                                }
                                await port.close();
                                console.log("Порт успешно закрыт");
                            }
                        } catch (e) {
                            console.warn("Ошибка при закрытии порта:", e);
                        }
                    }
                }
            } catch (err) {
                console.warn("Не удалось проверить порты:", err);
            }
        }
        
        // Перехват перезагрузки страницы
        window.addEventListener('beforeunload', async () => {
            console.log("Страница перезагружается, закрываем порт...");
            isClosing = true;
            readingEnabled = false;
            
            if (currentReader) {
                try {
                    await currentReader.cancel();
                    currentReader.releaseLock();
                } catch(e) {}
                currentReader = null;
            }
            
            if (window.port) {
                try {
                    if (window.port.readable) {
                        const reader = window.port.readable.getReader();
                        await reader.cancel();
                        reader.releaseLock();
                    }
                    await window.port.close();
                } catch(e) {
                    console.warn("Ошибка при закрытии порта:", e);
                }
                window.port = null;
            }
            
            connected = false;
        });
        
        async function startReadingLoop() {
            if (!connected || readingLoopActive || isClosing) return;
            if (!window.port?.readable) return;
            
            readingLoopActive = true;
            
            if (currentReader) {
                try { 
                    await currentReader.cancel(); 
                } catch(e) {}
                currentReader = null;
            }
            
            while (connected && window.port?.readable && !isClosing && !window.closed) {
                try {
                    currentReader = window.port.readable.getReader();
                    while (connected && !isClosing && !window.closed) {
                        try {
                            const { value, done } = await currentReader.read();
                            if (done) break;
                            if (readingEnabled && !isClosing) {
                                buffer += new TextDecoder().decode(value);
                                const lines = buffer.split('\n');
                                buffer = lines.pop() || '';
                                for (let line of lines) {
                                    line = line.replace('\r', '').trim();
                                    if (line === "") continue;
                                    const nums = line.match(/-?\d+/g);
                                    if (nums && nums.length) processNumbers(nums.map(Number));
                                    addMonitorText(line);
                                }
                            }
                        } catch (readErr) {
                            console.log("Ошибка чтения:", readErr);
                            break;
                        }
                    }
                } catch (err) {
                    console.log("Ошибка в цикле чтения:", err);
                    await new Promise(r => setTimeout(r, 100));
                } finally {
                    if (currentReader) {
                        try { 
                            currentReader.releaseLock(); 
                        } catch(e) {}
                        currentReader = null;
                    }
                }
                
                if (connected && (!window.port || !window.port.readable)) {
                    console.log("Порт потерян, выходим из цикла");
                    break;
                }
            }
            
            readingLoopActive = false;
        }
        
        async function connectSerial() {
            if (isClosing) return;
            try {
                if (window.port) {
                    await disconnectSerial();
                    await new Promise(r => setTimeout(r, 100));
                }
                
                window.port = await navigator.serial.requestPort();
                await window.port.open({ baudRate: parseInt($("#baudRate").val()) });
                connected = true;
                isClosing = false;
                updateUI();
                readingEnabled = true;
                readingLoopActive = false;
                $(".stopRead, .stopReadGlobal, .stopReadMonitor").html("Остановить чтение");
                allData = [];
                monitorLines = [];
                $("#port").val('');
                drawPlotter();
                
                setTimeout(() => startReadingLoop(), 100);
            } catch (err) {
                console.error("Ошибка подключения:", err);
                alert("Ошибка: " + err.message);
                connected = false;
                updateUI();
            }
        }
        
        async function disconnectSerial() {
            isClosing = true;
            readingEnabled = false;
            readingLoopActive = false;
            
            if (currentReader) {
                try { 
                    await currentReader.cancel(); 
                } catch(e) {}
                try { 
                    currentReader.releaseLock(); 
                } catch(e) {}
                currentReader = null;
            }
            
            if (window.port) {
                try {
                    if (window.port.readable) {
                        const reader = window.port.readable.getReader();
                        try { await reader.cancel(); } catch(e) {}
                        try { reader.releaseLock(); } catch(e) {}
                    }
                    await window.port.close();
                } catch(e) {
                    console.warn("Ошибка при закрытии порта:", e);
                }
                window.port = null;
            }
            
            connected = false;
            isClosing = false;
            updateUI();
        }
        
        async function writeSerial(msg) {
            if (!window.port?.writable || isClosing) return;
            const writer = window.port.writable.getWriter();
            try {
                await writer.write(new TextEncoder().encode(msg));
                if (showUserMessages) addMonitorText("> " + msg);
            } catch(e) { console.warn(e); }
            finally { writer.releaseLock(); }
        }
        
        function updateUI() {
            if (connected && !isClosing) {
                $("#status").removeClass("text-red-400").addClass("text-green-400").text("[Подключено]");
                const info = window.port.getInfo?.() || {};
                $("#connectInfo").html(`Подключено<br>Время: ${new Date().toLocaleTimeString()}<br>Скорость: ${$("#baudRate").val()} бод<br>VID:${info.usbVendorId || '?'} PID:${info.usbProductId || '?'}`);
                $("#ctrlBtn").text("Отключиться");
            } else {
                $("#status").addClass("text-red-400").removeClass("text-green-400").text("[Отключено]");
                $("#connectInfo").html("Подключитесь для получения информации");
                $("#ctrlBtn").text("Подключиться");
            }
        }
        
        function findNearestVertex(mouseX, mouseY) {
            const ACTIVATION_RADIUS = 8;
            let bestDist = ACTIVATION_RADIUS + 1;
            let best = null;
            
            for (let lineIdx = 0; lineIdx < allData.length; lineIdx++) {
                const arr = allData[lineIdx];
                if (!arr) continue;
                for (let i = 0; i < arr.length; i++) {
                    const val = arr[i];
                    if (isNaN(val)) continue;
                    const px = getX(i, arr.length);
                    const py = getY(val);
                    const dx = mouseX - px, dy = mouseY - py;
                    const dist = Math.hypot(dx, dy);
                    if (dist < bestDist) {
                        bestDist = dist;
                        best = {
                            line: lineIdx,
                            value: val,
                            lastValue: arr[arr.length-1],
                            color: colors[lineIdx % colors.length]
                        };
                    }
                }
            }
            return best;
        }
        
        function onCanvasMove(e) {
            if (!isPlotter) { tooltipDiv.classList.add('hidden'); return; }
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;
            const vertex = findNearestVertex(mouseX, mouseY);
            if (vertex) {
                const html = `<span style="color:${vertex.color};font-weight:bold;">●</span> <strong>Линия ${vertex.line+1}</strong><br>Значение: ${vertex.value}<br>Последнее: ${vertex.lastValue}`;
                tooltipDiv.innerHTML = html;
                tooltipDiv.style.borderLeftColor = vertex.color;
                tooltipDiv.classList.remove('hidden');
                let left = e.clientX + 15;
                let top = e.clientY - 35;
                if (left + 210 > window.innerWidth) left = e.clientX - 220;
                if (top < 10) top = e.clientY + 15;
                tooltipDiv.style.left = left + 'px';
                tooltipDiv.style.top = top + 'px';
            } else {
                tooltipDiv.classList.add('hidden');
            }
        }
        
        function onCanvasLeave() {
            tooltipDiv.classList.add('hidden');
        }
        
        canvas.addEventListener('mousemove', onCanvasMove);
        canvas.addEventListener('mouseleave', onCanvasLeave);
        
        // ---------- ИНИЦИАЛИЗАЦИЯ ИНТЕРФЕЙСА ----------
        $(function() {
            checkExistingPort().then(() => {
                console.log("Готово к работе");
            });
            
            resizeCanvas();
            $("#xmaxtext").val(xMax);
            $("#ymaxtext").val(yMax);
            $("#mxlines").val(mxLines);
            $("#autosize").prop("checked", autoSize);
            $("#showdots").prop("checked", showDots);
            
            $("#ctrlBtn").click(async () => {
                if (connected && !isClosing) await disconnectSerial();
                else await connectSerial();
            });
            $("#sendMessage").click(async () => {
                let suf = "";
                const mode = $("#addToMsg").val();
                if (mode === "Новая строка (\\n)") suf = "\n";
                else if (mode === "Возврат каретки (\\r)") suf = "\r";
                else if (mode === "Новая строка и возврат каретки (\\r\\n)") suf = "\r\n";
                await writeSerial($("#message").val() + suf);
                $("#message").val("");
            });
            $("#clsMessage").click(() => $("#message").val(""));
            
            $("#autosize").change(e => {
                autoSize = e.target.checked;
                if (!autoSize) {
                    xMax = parseInt($("#xmaxtext").val()) || 120;
                    yMax = parseInt($("#ymaxtext").val()) || 2048;
                    drawPlotter();
                }
            });
            
            $("#showdots").change(e => {
                showDots = e.target.checked;
                drawPlotter();
            });
            
            $("#xmaxtext, #ymaxtext").change(() => {
                if (!autoSize) {
                    xMax = parseInt($("#xmaxtext").val()) || 120;
                    yMax = parseInt($("#ymaxtext").val()) || 2048;
                    drawPlotter();
                }
            });
            $("#autoscroll").change(e => autoScroll = e.target.checked);
            $("#autoshowtime").change(e => autoShowTime = e.target.checked);
            $("#autonewline").change(e => autoNewLine = e.target.checked);
            $("#showusermessages").change(e => showUserMessages = e.target.checked);
            $("#mxlines").change(e => {
                mxLines = Math.max(10, parseInt(e.target.value) || 100);
                while (monitorLines.length > mxLines) {
                    monitorLines.shift();
                }
                $("#port").val(monitorLines.join(''));
            });
            
            $(".monPortActivate").click(() => { 
                $("#plotter").hide(); 
                $("#monport").show(); 
                isPlotter = false; 
            });
            $(".plotterActivate").click(() => { 
                $("#plotter").show(); 
                $("#monport").hide(); 
                isPlotter = true; 
                drawPlotter(); 
            });
            updateUI();
        });
    </script>
</body>
